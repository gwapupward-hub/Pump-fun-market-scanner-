[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "pump-intel"
version = "0.1.0"
description = "Pump.fun market intelligence agent (analytics only)"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "httpx>=0.27,<0.29",
  "sqlalchemy>=2.0,<3",
  "psycopg[binary]>=3.1,<4",
  "pydantic>=2.6,<3",
  "pydantic-settings>=2.2,<3",
  "apscheduler>=3.10,<4",
  "python-dotenv>=1.0,<2",
  "openai>=1.30,<2",
]

[project.optional-dependencies]
dev = ["pytest>=8,<9", "ruff>=0.4"]

[project.scripts]
pump-intel = "pump_intel.cli:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["pump_intel*"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py311"
