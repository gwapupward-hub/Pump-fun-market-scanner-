[project]
name = "pump-intel"
version = "0.1.0"
description = "Pump.fun market intelligence (analytics only; no trading)."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "httpx==0.27.2",
  "psycopg[binary]==3.1.19",
  "pydantic==2.7.4",
  "pydantic-settings==2.3.4",
  "python-dateutil==2.9.0.post0",
]

[project.scripts]
pump-intel = "pump_intel.cli:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["pump_intel*"]

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
